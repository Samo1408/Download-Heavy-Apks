name: APK Processor and Uploader

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL to the APKs/APKM/APKX file'
        required: true
        type: string
      include_patterns:
        description: 'Comma-separated list of file patterns to include (e.g., base.apk,split_config.arm64_v8a.apk)'
        required: false
        type: string
        default: 'base.apk'
      compression_type:
        description: 'Compression type for the output file (zip or tar.gz)'
        required: false
        type: choice
        options:
          - zip
          - tar.gz
        default: 'zip'
      upload_destination:
        description: 'Upload destination (artifacts or release)'
        required: false
        type: choice
        options:
          - artifacts
          - release
        default: 'artifacts'
      release_tag:
        description: 'Release tag to create or update (only for release upload)'
        required: false
        type: string

jobs:
  process_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK file
        run: |
          curl -L -o downloaded_apk.zip "${{ github.event.inputs.apk_url }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip python3 zip
          # aapt2 is usually pre-installed in GitHub Runners under Android SDK
          # We will locate it dynamically in the next step

      - name: Extract APK file
        run: |
          mkdir extracted_apk
          unzip downloaded_apk.zip -d extracted_apk

      - name: Get App Info and Generate Metadata
        id: app_info
        run: |
          # Locate aapt2 in the Android SDK
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name aapt2 -executable | sort -r | head -n 1)
          echo "Using aapt2 at: $AAPT2_PATH"
          
          APP_NAME="Unknown"
          APP_VERSION="1.0"
          VERSION_CODE="1"
          PKG_NAME="com.example.app"
          
          if [ -f extracted_apk/base.apk ]; then
            DUMP=$($AAPT2_PATH dump badging extracted_apk/base.apk)
            APP_NAME=$(echo "$DUMP" | grep "application: label=" | sed -n "s/.*label='\([^']\+\).*/\1/p")
            APP_VERSION=$(echo "$DUMP" | grep "versionName=" | sed -n "s/.*versionName='\([^']\+\).*/\1/p")
            VERSION_CODE=$(echo "$DUMP" | grep "versionCode=" | sed -n "s/.*versionCode='\([^']\+\).*/\1/p")
            PKG_NAME=$(echo "$DUMP" | grep "package: name=" | sed -n "s/.*name='\([^']\+\).*/\1/p")
          fi
          
          # Fallback for APP_NAME if empty
          if [ -z "$APP_NAME" ]; then APP_NAME="App"; fi
          
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          mkdir -p processed_apk
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.include_patterns }}"
          for i in "${ADDR[@]}"; do
            # Use -i for case-insensitive matching and handle patterns better
            find extracted_apk -maxdepth 1 -iname "$i" -exec cp {} processed_apk/ \;
          done

          # Generate base.digests, app.metadata, and base.dm
          cat <<EOF > generate_metadata.py
          import os, hashlib, json, zipfile
          from pathlib import Path
          def calculate_sha256(file_path):
              sha256_hash = hashlib.sha256()
              with open(file_path, "rb") as f:
                  for byte_block in iter(lambda: f.read(4096), b""):
                      sha256_hash.update(byte_block)
              return sha256_hash.hexdigest()
          
          dir_path = "processed_apk"
          digests = []
          for apk_file in sorted(os.listdir(dir_path)):
              if apk_file.lower().endswith(".apk"):
                  sha256 = calculate_sha256(os.path.join(dir_path, apk_file))
                  digests.append(f"{apk_file}:{sha256}")
          
          with open(os.path.join(dir_path, "base.digests"), "w") as f:
              f.write("\n".join(digests))
          
          metadata = {
              "app_name": "$APP_NAME",
              "version_name": "$APP_VERSION",
              "version_code": "$VERSION_CODE",
              "package_name": "$PKG_NAME"
          }
          with open(os.path.join(dir_path, "app.metadata"), "w") as f:
              json.dump(metadata, f, indent=4)

          # Generate base.dm if base.apk exists
          if os.path.exists(os.path.join(dir_path, "base.apk")):
              with open("primary.prof", "wb") as f: f.write(b"")
              with zipfile.ZipFile(os.path.join(dir_path, "base.dm"), 'w') as zipf:
                  zipf.write("primary.prof", "primary.prof")
              os.remove("primary.prof")
          EOF
          python3 generate_metadata.py

      - name: Re-compress
        id: recompress
        run: |
          # Clean app name for filename compatibility
          CLEAN_APP_NAME=$(echo "${{ steps.app_info.outputs.app_name }}" | sed 's/[^a-zA-Z0-9]/_/g')
          OUTPUT_FILENAME="${CLEAN_APP_NAME}_${{ steps.app_info.outputs.app_version }}"
          
          if [ "${{ github.event.inputs.compression_type }}" == "zip" ]; then
            cd processed_apk && zip -r "../$OUTPUT_FILENAME.zip" . && cd ..
            echo "output_file=$OUTPUT_FILENAME.zip" >> $GITHUB_OUTPUT
          else
            cd processed_apk && tar -czf "../$OUTPUT_FILENAME.tar.gz" . && cd ..
            echo "output_file=$OUTPUT_FILENAME.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload as Artifact
        if: ${{ github.event.inputs.upload_destination == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.recompress.outputs.output_file }}
          path: ${{ steps.recompress.outputs.output_file }}

      - name: Create Release and Upload Asset
        if: ${{ github.event.inputs.upload_destination == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || steps.app_info.outputs.app_version }}
          name: Release ${{ steps.app_info.outputs.app_name }} ${{ github.event.inputs.release_tag || steps.app_info.outputs.app_version }}
          files: ${{ steps.recompress.outputs.output_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
