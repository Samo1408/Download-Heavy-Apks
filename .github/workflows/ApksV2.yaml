name: APK Processor and Uploader

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL to the APKs/APKM/APKX file'
        required: true
        type: string
      include_patterns:
        description: 'Comma-separated list of file patterns to include (e.g., base.apk,split_config.arm64_v8a.apk)'
        required: false
        type: string
        default: 'base.apk'
      compression_type:
        description: 'Compression type for the output file (zip or tar.gz)'
        required: false
        type: choice
        options:
          - zip
          - tar.gz
        default: 'zip'
      upload_destination:
        description: 'Upload destination (artifacts or release)'
        required: false
        type: choice
        options:
          - artifacts
          - release
        default: 'artifacts'
      release_tag:
        description: 'Release tag (will be cleaned automatically)'
        required: false
        type: string

jobs:
  process_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip python3 zip curl wget

      - name: Download APK file
        run: |
          echo "Downloading from: ${{ github.event.inputs.apk_url }}"
          wget -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -O downloaded_file "${{ github.event.inputs.apk_url }}"
          
          FILE_TYPE=$(file downloaded_file)
          echo "Detected file type: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" == *"HTML document"* ]]; then
            echo "Error: The URL provided seems to be a web page, not a direct download link."
            exit 1
          fi

      - name: Extract APK file
        run: |
          mkdir extracted_apk
          if ! unzip downloaded_file -d extracted_apk; then
            echo "Unzip failed. Attempting alternative extraction..."
            cp downloaded_file temp_archive.zip
            unzip temp_archive.zip -d extracted_apk || (echo "Extraction failed completely." && exit 1)
          fi

      - name: Get App Info and Generate Metadata
        id: app_info
        run: |
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name aapt2 -executable | sort -r | head -n 1)
          
          APP_NAME="Unknown"
          APP_VERSION="1.0"
          VERSION_CODE="1"
          PKG_NAME="com.example.app"
          
          BASE_APK_PATH=$(find extracted_apk -iname "base.apk" | head -n 1)
          
          if [ -f "$BASE_APK_PATH" ]; then
            DUMP=$($AAPT2_PATH dump badging "$BASE_APK_PATH")
            APP_NAME=$(echo "$DUMP" | grep "application: label=" | sed -n "s/.*label='\([^']\+\).*/\1/p")
            APP_VERSION=$(echo "$DUMP" | grep "versionName=" | sed -n "s/.*versionName='\([^']\+\).*/\1/p")
            VERSION_CODE=$(echo "$DUMP" | grep "versionCode=" | sed -n "s/.*versionCode='\([^']\+\).*/\1/p")
            PKG_NAME=$(echo "$DUMP" | grep "package: name=" | sed -n "s/.*name='\([^']\+\).*/\1/p")
          fi
          
          if [ -z "$APP_NAME" ]; then APP_NAME="App"; fi
          
          # Handle tag and display names
          USER_INPUT_TAG="${{ github.event.inputs.release_tag }}"
          FINAL_TAG_SOURCE="${USER_INPUT_TAG:-$APP_VERSION}"
          CLEAN_TAG=$(echo "$FINAL_TAG_SOURCE" | sed 's/[^a-zA-Z0-9._-]/_/g')
          FILE_APP_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          
          # Set outputs for subsequent steps
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "clean_tag=$CLEAN_TAG" >> $GITHUB_OUTPUT
          echo "file_app_name=$FILE_APP_NAME" >> $GITHUB_OUTPUT
          echo "display_tag=$FINAL_TAG_SOURCE" >> $GITHUB_OUTPUT

          mkdir -p processed_apk
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.include_patterns }}"
          for i in "${ADDR[@]}"; do
            find extracted_apk -maxdepth 2 -iname "*$i*" -exec cp {} processed_apk/ \;
          done

          cat <<EOF > generate_metadata.py
          import os, hashlib, json, zipfile
          def calculate_sha256(file_path):
              sha256_hash = hashlib.sha256()
              with open(file_path, "rb") as f:
                  for byte_block in iter(lambda: f.read(4096), b""):
                      sha256_hash.update(byte_block)
              return sha256_hash.hexdigest()
          
          dir_path = "processed_apk"
          digests = []
          for apk_file in sorted(os.listdir(dir_path)):
              if apk_file.lower().endswith(".apk"):
                  sha256 = calculate_sha256(os.path.join(dir_path, apk_file))
                  digests.append(f"{apk_file}:{sha256}")
          
          with open(os.path.join(dir_path, "base.digests"), "w") as f:
              f.write("\n".join(digests))
          
          metadata = {
              "app_name": "$APP_NAME",
              "version_name": "$APP_VERSION",
              "version_code": "$VERSION_CODE",
              "package_name": "$PKG_NAME"
          }
          with open(os.path.join(dir_path, "app.metadata"), "w") as f:
              json.dump(metadata, f, indent=4)

          base_file = next((f for f in os.listdir(dir_path) if f.lower() == "base.apk"), None)
          if base_file:
              with open("primary.prof", "wb") as f: f.write(b"")
              with zipfile.ZipFile(os.path.join(dir_path, "base.dm"), 'w') as zipf:
                  zipf.write("primary.prof", "primary.prof")
              os.remove("primary.prof")
          EOF
          python3 generate_metadata.py

      - name: Re-compress
        id: recompress
        run: |
          OUTPUT_FILENAME="${{ steps.app_info.outputs.file_app_name }}_${{ steps.app_info.outputs.app_version }}"
          OUTPUT_FILENAME=$(echo "$OUTPUT_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          
          if [ "${{ github.event.inputs.compression_type }}" == "zip" ]; then
            cd processed_apk && zip -r "../$OUTPUT_FILENAME.zip" . && cd ..
            echo "output_file=$OUTPUT_FILENAME.zip" >> $GITHUB_OUTPUT
          else
            cd processed_apk && tar -czf "../$OUTPUT_FILENAME.tar.gz" . && cd ..
            echo "output_file=$OUTPUT_FILENAME.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload as Artifact
        if: ${{ github.event.inputs.upload_destination == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.recompress.outputs.output_file }}
          path: ${{ steps.recompress.outputs.output_file }}

      - name: Create Release and Upload Asset
        if: ${{ github.event.inputs.upload_destination == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.app_info.outputs.clean_tag }}
          name: Release ${{ steps.app_info.outputs.app_name }} ${{ steps.app_info.outputs.display_tag }}
          files: ${{ steps.recompress.outputs.output_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
